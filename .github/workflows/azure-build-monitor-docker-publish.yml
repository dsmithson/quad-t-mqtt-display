name: Publish azureBuildMonitor Docker image

on:
  push:
    branches: [ "main" ]
    tags: [ "azureBuildMonitor-v*" ]
    paths:
      - "azureBuildMonitor/**"
      - ".github/workflows/azure-build-monitor-docker-publish.yml"

env:
  IMAGE_NAME: dsmithson/custom-build-monitor

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: dsmithson/custom-build-monitor
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=match,pattern=azureBuildMonitor-v(.*),group=1
            type=sha,format=short

      - name: Build & Push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: azureBuildMonitor
          file: azureBuildMonitor/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=dsmithson/custom-build-monitor:buildcache
          cache-to: type=registry,ref=dsmithson/custom-build-monitor:buildcache,mode=max
