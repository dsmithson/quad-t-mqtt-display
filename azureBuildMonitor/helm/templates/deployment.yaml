apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "azurebuildmonitor.fullname" . }}
  labels: {{- include "azurebuildmonitor.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "azurebuildmonitor.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "azurebuildmonitor.name" . }}
        {{- with .Values.podLabels }}{{ toYaml . | nindent 8 }}{{- end }}
      annotations:
        # Forces a rollout whenever the ConfigMap's content changes.
        # envFrom only reads env vars at container startup, so without
        # this a `helm upgrade` that only touches values.yaml (brightness,
        # timing, status colors, ...) silently has no effect on the
        # already-running pod until something else happens to restart it.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{ toYaml . | nindent 8 }}
        {{- end }}
    spec:
      containers:
      - name: azurebuildmonitor
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        envFrom:
        - configMapRef:
            name: {{ include "azurebuildmonitor.fullname" . }}-cfg
        env:
        - name: AZURE_DEVOPS_PAT
          valueFrom:
            secretKeyRef:
              name: {{ .Values.azureDevOps.existingSecret }}
              key: {{ .Values.azureDevOps.existingSecretKey | default "AZURE_DEVOPS_PAT" }}
        resources: {{- toYaml .Values.resources | nindent 10 }}
