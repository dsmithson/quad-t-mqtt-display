image:
  repository: dsmithson/custom-build-monitor
  tag: "latest"
  # Always, not IfNotPresent -- "latest" is a mutable tag, and
  # IfNotPresent means the kubelet reuses whatever it already has cached
  # locally under that tag without checking the registry, so a rollout
  # (even one forced by checksum/config) can silently keep running an
  # old binary forever. Pin to an immutable sha-<shortsha> tag instead if
  # you want reproducible deploys where this doesn't matter.
  pullPolicy: Always

replicas: 1

azureDevOps:
  url: "https://dev.azure.com/your-org"
  projectName: "YourProject"
  # One hexagon pixel per ID, in this order -- max 7 (the Quad-T panel's
  # hexagon only has 7 pixels). Find these in each pipeline's URL:
  # _build?definitionId=<id>.
  buildDefinitionIds: [1, 2, 3, 4, 5, 6, 7]
  # The PAT itself is never set here -- create it out of band with:
  #   kubectl create secret generic azure-devops-pat -n azure-build-monitor \
  #     --from-literal=AZURE_DEVOPS_PAT=<token>
  existingSecret: "azure-devops-pat"
  existingSecretKey: "AZURE_DEVOPS_PAT"

# How often to do a full re-poll of every pipeline's last 4 builds. Kept
# high because the real-time webhook listener (buildEventTopic below)
# should catch changes as they happen -- this is just the drift-correction
# backstop.
fullRefreshIntervalSeconds: 3600

# How long EACH OLED line-2 message shows before switching to the next
# one (status+time, then branch -- a pipeline's full "slot" is the number
# of messages it has times this). Applies per-line, not per-pipeline.
statusLineDurationSeconds: 5

mqtt:
  # Same broker the Quad-T panel itself uses.
  serverUrl: "mqtt-mosquitto.mqtt.svc"
  serverPort: 1883
  # Topic the Azure DevOps webhook (relayed through N8N) publishes
  # run.statechanged events to.
  buildEventTopic: "azureDevOps/builds/buildEvent"

quadT:
  deviceName: "quadTFrontPanel01"
  # How much to scale down the 6 non-selected hexagon pixels, so the
  # currently-highlighted pipeline stands out. Experiment with this to
  # taste.
  dimPixelMultiplier: 0.25

# Per-status LED colors, with separate values for the hexagon pixels
# (behind a diffuser -- usually needs to run brighter/more saturated) and
# the 4 strip pixels (no diffuser -- usually needs to run dimmer). This is
# where brightness tuning lives now instead of a single global
# "brightness" knob: since each status/group combination has its own
# explicit r/g/b, just pick dimmer or brighter values directly rather
# than applying a multiplier on top. blinkDurationSeconds only matters
# for "running" (the only status that blinks); omit it elsewhere.
#
# Every status below is optional -- anything you don't override here
# keeps the app's built-in default (see internal/display/colors.go),
# so you only need to list the ones you're actually tuning.
statusColors:
  pending:
    hexagon: { r: 0, g: 0, b: 255 }
    strip: { r: 0, g: 0, b: 255 }
  running:
    hexagon: { r: 0, g: 0, b: 255 }
    strip: { r: 0, g: 0, b: 255 }
    blinkDurationSeconds: 1.0
  succeeded:
    hexagon: { r: 0, g: 255, b: 0 }
    strip: { r: 0, g: 255, b: 0 }
  failed:
    hexagon: { r: 255, g: 0, b: 0 }
    strip: { r: 255, g: 0, b: 0 }
  cancelled:
    hexagon: { r: 128, g: 128, b: 128 }
    strip: { r: 128, g: 128, b: 128 }

resources:
  requests:
    cpu: "50m"
    memory: "32Mi"
  limits:
    cpu: "200m"
    memory: "64Mi"

podLabels: {}
podAnnotations: {}
